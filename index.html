<html lang="en">
  <head>

    <link rel="canonical" href="https://ghpranav.dev/" />

    <meta
      property="og:description"
      content="Pranav Bedre — software engineer at Cisco working on AI agents, backend, and developer experience. Terminal portfolio with an on-device LLM you can chat with about my work."
    />
    <meta property="og:url" content="https://ghpranav.dev/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="pranav@dev:~$" />
    <meta
      name="twitter:description"
      content="Pranav Bedre — software engineer at Cisco working on AI agents, backend, and developer experience. Terminal portfolio with an on-device LLM you can chat with about my work."
    />
    <style>
      :root {
        --shell-bg: #1a120b;
        --shell-bg-rgb: 26, 18, 11;
        --shell-panel: #241810;
        --shell-fg: #e8d5b7;
        --shell-dim: #9d8165;
        --shell-dim-rgb: 157, 129, 101;
        --shell-accent2: #a8d8b9;
        --shell-grain: 0.04;
        --shell-theme-name: "espresso";
      }

      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        min-height: 100dvh;
      }

      body {
        background: var(--shell-bg);
        color: var(--shell-fg);
        font-family: "JetBrains Mono", "IBM Plex Mono", ui-monospace, monospace;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        overflow: hidden;
      }
    </style>
    <script>
      (() => {
        const themes = {
          espresso: {
            bg: "#1a120b",
            bgRgb: "26, 18, 11",
            panel: "#241810",
            fg: "#e8d5b7",
            dim: "#9d8165",
            dimRgb: "157, 129, 101",
            accent2: "#a8d8b9",
            grain: "0.04",
            name: "espresso",
            scheme: "dark",
          },
          gruvbox: {
            bg: "#282828",
            bgRgb: "40, 40, 40",
            panel: "#32302f",
            fg: "#ebdbb2",
            dim: "#a6998d",
            dimRgb: "166, 153, 141",
            accent2: "#b8bb26",
            grain: "0.03",
            name: "gruvbox",
            scheme: "dark",
          },
          nord: {
            bg: "#2e3440",
            bgRgb: "46, 52, 64",
            panel: "#3b4252",
            fg: "#d8dee9",
            dim: "#a9b2c2",
            dimRgb: "169, 178, 194",
            accent2: "#a3be8c",
            grain: "0.02",
            name: "nord",
            scheme: "dark",
          },
          tokyo: {
            bg: "#1a1b26",
            bgRgb: "26, 27, 38",
            panel: "#24283b",
            fg: "#c0caf5",
            dim: "#8a92b6",
            dimRgb: "138, 146, 182",
            accent2: "#9ece6a",
            grain: "0.025",
            name: "tokyo-night",
            scheme: "dark",
          },
          paper: {
            bg: "#f4ecd8",
            bgRgb: "244, 236, 216",
            panel: "#ebe0c5",
            fg: "#3d2f1f",
            dim: "#6e5e46",
            dimRgb: "110, 94, 70",
            accent2: "#556b2f",
            grain: "0.06",
            name: "paper",
            scheme: "light",
          },
        };

        let themeName = "espresso";

        try {
          themeName = globalThis.localStorage?.getItem("ghpranav.dev:theme") || themeName;
        } catch {
          themeName = "espresso";
        }

        const theme = themes[themeName] || themes.espresso;
        const root = document.documentElement;
        root.style.setProperty("--shell-bg", theme.bg);
        root.style.setProperty("--shell-bg-rgb", theme.bgRgb);
        root.style.setProperty("--shell-panel", theme.panel);
        root.style.setProperty("--shell-fg", theme.fg);
        root.style.setProperty("--shell-dim", theme.dim);
        root.style.setProperty("--shell-dim-rgb", theme.dimRgb);
        root.style.setProperty("--shell-accent2", theme.accent2);
        root.style.setProperty("--shell-grain", theme.grain);
        root.style.setProperty("--shell-theme-name", `"${theme.name}"`);
        root.style.colorScheme = theme.scheme;

        const themeColor = document.querySelector('meta[name="theme-color"]');
        if (themeColor) themeColor.setAttribute("content", theme.bg);
      })();
    </script>
    <title>pranav@dev:~$</title>
  </head>
  <body>
    <div id="root">
      <!-- Static shell: instant first paint before React hydrates. React replaces this on mount. -->
      <style>
        .s-root {
          position: relative;
          min-height: 100vh;
          min-height: 100dvh;
          display: grid;
          place-content: center;
        }

        .s-grain {
          position: fixed;
          inset: 0;
          pointer-events: none;
          z-index: 0;
          opacity: var(--shell-grain);
          background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
        }

        .s-window {
          position: relative;
          z-index: 1;
          width: min(1024px, 100vw - 48px);
          height: min(calc(100vh - 48px), 800px);
          height: min(calc(100dvh - 48px), 800px);
          display: flex;
          flex-direction: column;
          border: 1px solid rgba(var(--shell-dim-rgb), 0.27);
          border-radius: 8px;
          background: var(--shell-panel);
          box-shadow:
            0 24px 48px rgba(var(--shell-bg-rgb), 1),
            0 0 0 1px rgba(var(--shell-dim-rgb), 0.13) inset;
          overflow: hidden;
        }

        .s-titlebar {
          display: flex;
          align-items: center;
          gap: 8px;
          padding: 10px 14px;
          border-bottom: 1px solid rgba(var(--shell-dim-rgb), 0.2);
          background: var(--shell-bg);
          flex-shrink: 0;
        }

        .s-dot {
          width: 12px;
          height: 12px;
          border-radius: 50%;
        }

        .s-title {
          flex: 1;
          text-align: center;
          color: var(--shell-dim);
          font-size: 12px;
          letter-spacing: 0.05em;
        }

        .s-theme-name::before {
          content: var(--shell-theme-name);
        }

        .s-body {
          padding: 18px 22px 60px;
          flex: 1;
          min-height: 0;
          overflow: hidden;
          font-size: 14px;
          line-height: 1.55;
        }

        .s-line {
          margin-bottom: 4px;
          white-space: pre-wrap;
        }

        .s-ok {
          color: var(--shell-accent2);
        }

        .s-boot {
          color: var(--shell-dim);
        }

        @media (max-width: 600px) {
          .s-window {
            width: calc(100vw - 16px);
            height: calc(100vh - 16px);
            height: calc(100dvh - 16px);
            border-radius: 6px;
          }

          .s-body {
            padding: 14px 14px 60px;
          }
        }
      </style>

      <div class="s-root">
        <div class="s-grain"></div>

        <div class="s-window">
          <div class="s-titlebar">
            <div class="s-dot" style="background: #ff5f56"></div>
            <div class="s-dot" style="background: #ffbd2e"></div>
            <div class="s-dot" style="background: #27c93f"></div>
            <div class="s-title">
              pranav@dev — zsh — <span class="s-theme-name" aria-hidden="true"></span>
            </div>
          </div>

          <div class="s-body">
            <div class="s-line"><span class="s-ok">[ ok ]</span><span class="s-boot"> mounting /dev/curiosity</span></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
